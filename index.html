<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Academy Ledger Hub</title>
  <style>
    :root {
      --bg-cream: #EFECE6; 
      --card-paper: #F7F5F0; 
      --ink-clay: #3C352E; 
      --text-muted: #8C837A; 
      --pottery-accent: #AA6C39; 
      --blue-stroke: #5D9CEC; 
      --wire-tan: #D9D2C5;       
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background-color: var(--bg-cream); 
      color: var(--ink-clay); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      overflow: hidden; 
      height: 100vh; 
    }
    .grid-bg { 
      background-image: 
        linear-gradient(to right, rgba(140, 133, 123, 0.04) 1px, transparent 1px), 
        linear-gradient(to bottom, rgba(140, 133, 123, 0.04) 1px, transparent 1px); 
      background-size: 24px 24px; 
    }
    .scholastic-header { 
      width: 100%; height: 88px; display: flex; align-items: center; 
      padding: 0 48px; background-color: var(--card-paper); 
      border-bottom: 2px solid var(--wire-tan); position: fixed; top: 0; left: 0; z-index: 100; 
    }
    .brand-title { font-family: Georgia, serif; font-size: 18px; font-weight: 700; }
    .presentation-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 88px; }
    .presentation-center { text-align: center; max-width: 640px; padding: 0 32px; }
    .text-stroke-wrapper { position: relative; display: inline-block; margin-bottom: 24px; }
    .presentation-title { font-family: Georgia, serif; font-size: clamp(28px, 5vw, 56px); font-weight: 700; position: relative; z-index: 5; line-height: 1.15; }
    .paint-stroke { position: absolute; bottom: 4px; left: -4%; width: 108%; height: 16px; background-color: var(--blue-stroke); z-index: 1; opacity: 0.75; border-radius: 4px; }
    .presentation-sub { font-size: 15px; line-height: 1.7; color: #5A524A; margin-bottom: 32px; }
    .editorial-caps { font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 16px; }
    .btn-primary { 
      background-color: var(--ink-clay); color: var(--card-paper); border: 2px solid var(--ink-clay); 
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; 
      padding: 14px 28px; cursor: pointer; border-radius: 4px; transition: all 0.3s; text-decoration: none; 
      display: inline-block;
    }
    .btn-primary:hover { padding-left: 36px; }
    .dual-gate-row { display: flex; gap: 16px; justify-content: center; }
    
    @media (max-width: 768px) { 
      .dual-gate-row { flex-direction: column; width: 100%; gap: 12px; } 
      .btn-primary { text-align: center; width: 100%; } 
    }
  </style>
</head>
<body class="grid-bg">
  <header class="scholastic-header"><div class="brand-title">Academy Desk</div></header>
  <div class="presentation-container">
    <div class="presentation-center">
      <span class="editorial-caps">// Portal Gateway</span>
      <div class="text-stroke-wrapper">
        <h1 class="presentation-title">Academy Ledger Loop</h1>
        <div class="paint-stroke"></div>
      </div>
      <p class="presentation-sub">Welcome to your standalone university routing terminal. Select an interface option below to load active query queues or dashboard metrics sheets.</p>
      <div class="dual-gate-row">
        <a href="student.html" class="btn-primary">Open Student Desk &rarr;</a>
        <a href="instructor.html" class="btn-primary" style="background-color: #4A6B53; border-color: #4A6B53;">Instructor Terminal &rarr;</a>
      </div>
    </div>
  </div>
</body>
</html>
